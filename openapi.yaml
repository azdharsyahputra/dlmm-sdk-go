        total_unfilled_amount_sol:
          type: string
          description: SOL value of the unfilled portion at the current SOL spot price.
        total_unfilled_amount_usd:
          type: string
          description: USD value of the unfilled portion at current spot prices.
        unrealized_pnl_pct_sol:
          type: string
          description: >-
