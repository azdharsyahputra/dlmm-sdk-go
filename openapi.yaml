    LimitOrderPoolDetails:
      type: object
      description: |-
        Pool-level metadata shared across all limit-order responses for a given
        pool. The same shape is emitted on every endpoint so clients can render
        the pool header from one struct.
      required:
        - pool_address
        - pair_name
        - bin_step
        - base_fee
        - token_x_mint
        - token_y_mint
        - token_x_icon
        - token_y_icon
        - token_x
        - token_y
        - collect_fee_mode
      properties:
        base_fee:
          type: string
          description: Pool base fee, expressed as a percentage.
        bin_step:
          type: integer
          format: int32
          description: Pool bin step in basis points.
          minimum: 0
        collect_fee_mode:
          type: integer
          format: int32
          description: >-
            Token the pool collects swap fees in, which determines where bonus

            accrues. `0` = `InputOnly` (bonus flows to the deposit/input token
            of

            each order); `1` = `OnlyY` (bonus is always paid in token Y).
          minimum: 0
        pair_name:
          type: string
          description: Pair name in the form `"{tokenX}-{tokenY}"` (e.g. `"SOL-USDC"`).
        pool_address:
          type: string
          description: Pool address.
        token_x:
          type: string
          description: Token X symbol.
        token_x_icon:
          type: string
          description: Token X icon URL.
        token_x_mint:
          type: string
          description: Token X mint address.
        token_y:
          type: string
          description: Token Y symbol.
        token_y_icon:
          type: string
          description: Token Y icon URL.
        token_y_mint:
          type: string
          description: Token Y mint address.
    LimitOrderSummaryResponse:
      type: object
      description: >-
        Aggregate totals for a wallet's limit orders across every pool.


        `_sol` fields use the placement-time SOL price for deposits and the

        current-spot SOL price for bonus and current-value rollups. A limit
        order

        is considered open until it is closed on-chain; cancels alone do not
        close

        it.
      required:
        - open_orders
        - closed_orders
        - total_deposit_usd
        - total_deposit_sol
        - total_bonus_usd
        - total_bonus_sol
        - total_claimable_bonus_usd
        - total_claimable_bonus_sol
        - total_current_value_usd
        - total_current_value_sol
        - realized_pnl_usd
        - realized_pnl_sol
        - realized_pnl_pct_usd
        - realized_pnl_pct_sol
        - unrealized_pnl_usd
        - unrealized_pnl_sol
        - unrealized_pnl_pct_usd
        - unrealized_pnl_pct_sol
      properties:
        closed_orders:
          type: integer
          format: int64
          description: Number of limit orders that have been closed on-chain.
          minimum: 0
        open_orders:
          type: integer
          format: int64
          description: Number of limit orders that are still open (no close event).
          minimum: 0
        realized_pnl_pct_sol:
          type: string
          description: >-
            Realized PnL as a percentage of the closed-order SOL deposit cost
            basis

            (`0` when there are no closed-order SOL deposits).
        realized_pnl_pct_usd:
          type: string
          description: >-
            Realized PnL as a percentage of the closed-order USD deposit cost
            basis

            (`0` when there are no closed-order USD deposits).
        realized_pnl_sol:
          type: string
          description: Realized PnL in SOL (historical per-event prices).
        realized_pnl_usd:
          type: string
          description: |-
            Realized PnL across the wallet's **closed** orders, in USD:
            `(closed withdrawals + closed bonus) − closed deposits`, all at
            historical (placement / cancel-time) prices.
        total_bonus_sol:
          type: string
          description: Total SOL equivalent of `total_bonus_usd` (cancel-event SOL price).
        total_bonus_usd:
          type: string
          description: Total USD value of bonus **already realized from cancel events**
        total_claimable_bonus_sol:
          type: string
          description: >-
            SOL equivalent of `total_claimable_bonus_usd` at the current SOL
            spot price.
        total_claimable_bonus_usd:
          type: string
          description: >-
            Currently-claimable bonus across every open LO. Priced at current
            spot.
        total_current_value_sol:
          type: string
          description: >-
            SOL equivalent of `total_current_value_usd` at the current SOL spot
            price.
        total_current_value_usd:
          type: string
          description: >-
            Live dollar value of every currently-open LO across every pool,
            priced at

            current spot: unfilled input + filled output + unrealized bonus.
            Equal to

            `Σ open_pools[*].total_current_value_usd`.
        total_deposit_sol:
          type: string
          description: >-
            Total SOL value of currently-open order deposits (placement-time SOL
            price).
        total_deposit_usd:
          type: string
          description: Total USD value of currently-open order deposits.
        unrealized_pnl_pct_sol:
          type: string
          description: |-
            Unrealized PnL as a percentage of the open-order SOL deposit basis
            (`0` when there are no open-order SOL deposits).
        unrealized_pnl_pct_usd:
          type: string
          description: |-
            Unrealized PnL as a percentage of the open-order USD deposit basis
            (`0` when there are no open-order USD deposits).
        unrealized_pnl_sol:
          type: string
          description: >-
            Unrealized PnL in SOL: `total_current_value_sol` minus the open
            orders'

            deposits (placement-time SOL price).
        unrealized_pnl_usd:
          type: string
          description: |-
            Unrealized PnL across the wallet's **open** orders, in USD: the live
            current-spot value of every open order (`total_current_value_usd`)
            minus those orders' deposits.
