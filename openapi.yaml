    OpenLimitOrderDetail:
      type: object
      description: >-
        Per-order detail for an open limit order inside a specific pool. Amounts

        use `input`/`output` terminology: input is the deposited token, output
        is

        the expected fill token. Pool-level metadata is emitted once at the top
        of

        the response.
      required:
        - limit_order_address
        - user_address
        - is_ask_side
        - lower_pool_price
        - upper_pool_price
        - input_token
        - input_token_mint
        - output_token
        - output_token_mint
        - input_amount
        - input_amount_usd
        - input_amount_sol
        - output_amount_expected
        - filled_pct
        - filled_input_amount
        - total_filled_amount
        - total_filled_amount_usd
        - total_filled_amount_sol
        - total_unfilled_amount
        - total_unfilled_amount_usd
        - total_unfilled_amount_sol
        - total_bonus_x
        - total_bonus_y
        - total_bonus_usd
        - total_bonus_sol
        - unrealized_pnl_usd
        - unrealized_pnl_sol
        - unrealized_pnl_pct_usd
        - unrealized_pnl_pct_sol
        - opened_at
        - opened_at_signature
        - opened_at_slot
        - bin_distribution
      properties:
        bin_distribution:
          type: array
          items:
            $ref: '#/components/schemas/OpenLimitOrderBinPoint'
          description: Per-bin distribution for this order, sorted by `bin_id` ascending.
        filled_input_amount:
          type: string
          description: Filled amount, in input (deposit) token display units.
        filled_pct:
          type: string
          description: Percentage of the order's deposit that has been filled (0–100).
        input_amount:
          type: string
          description: Total deposited amount, in input-token display units.
        input_amount_sol:
          type: string
          description: SOL value of the deposit at placement time.
        input_amount_usd:
          type: string
          description: USD value of the deposit at placement time.
        input_token:
          type: string
          description: Symbol of the deposited token (X for ask, Y for bid).
        input_token_mint:
          type: string
          description: Mint address of the deposited token.
        is_ask_side:
          type: boolean
          description: |-
            `true` for an ask (selling token X for Y), `false` for a bid
            (buying X with Y).
        limit_order_address:
          type: string
          description: On-chain limit order account address.
        lower_pool_price:
