            (placement-time).
        unrealized_pnl_usd:
          type: string
          description: >-
            Unrealized PnL in USD (mark-to-market): current value (filled output
            +

            unfilled input + accrued bonus, at current spot) −
            `input_amount_usd`

            (placement deposit).
