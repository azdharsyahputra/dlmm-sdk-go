          type: string
          description: Token X bonus accrued by this order, in token X display units.
        total_bonus_y:
          type: string
          description: Token Y bonus accrued by this order, in token Y display units.
        total_filled_amount:
          type: string
          description: |-
            Filled amount expressed in output-token display units — an estimate
