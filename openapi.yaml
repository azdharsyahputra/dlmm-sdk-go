components:
  schemas:
    AddressPath:
      type: object
      required:
        - address
      properties:
        address:
          type: string
    AmountTotals:
      type: object
      required:
        - amount_x
        - amount_y
        - amount_usd
      properties:
        amount_usd:
          type: number
          format: double
        amount_x:
          type: number
          format: double
        amount_y:
          type: number
          format: double
    BonusClaimedResponse:
      type: object
      description: >-
        Realised bonus a wallet has claimed on one pool. Aggregates every cancel

        the wallet has on the pool, including cancels on orders that have not
        yet

        been closed (bonus is paid at cancel time). USD and SOL values use

        cancel-time prices, not current spot.
      required:
        - total_bonus_x
        - total_bonus_y
        - total_bonus_x_usd
        - total_bonus_y_usd
        - total_bonus_x_sol
        - total_bonus_y_sol
        - total_bonus_usd
        - total_bonus_sol
        - cancel_event_count
      properties:
        cancel_event_count:
          type: integer
          format: int64
          description: Number of distinct cancel events contributing to these totals.
          minimum: 0
        total_bonus_sol:
          type: string
          description: '`total_bonus_x_sol + total_bonus_y_sol`.'
        total_bonus_usd:
          type: string
          description: '`total_bonus_x_usd + total_bonus_y_usd`.'
        total_bonus_x:
          type: string
          description: Bonus token X claimed, in token X display units (decimals applied).
        total_bonus_x_sol:
          type: string
          description: Bonus token X claimed, in SOL (cancel-time SOL price).
        total_bonus_x_usd:
          type: string
          description: Bonus token X claimed, in USD (cancel-time price).
        total_bonus_y:
          type: string
          description: Bonus token Y claimed, in token Y display units (decimals applied).
        total_bonus_y_sol:
          type: string
          description: Bonus token Y claimed, in SOL (cancel-time SOL price).
        total_bonus_y_usd:
          type: string
          description: Bonus token Y claimed, in USD (cancel-time price).
    ClosedLimitOrderDetail:
      type: object
      description: |-
        Per-order lifecycle row for a closed limit order in a specific pool.
        Pool-level metadata lives once at the top of the response.
      required:
        - limit_order_address
        - user_address
        - is_ask_side
        - lower_pool_price
        - upper_pool_price
        - input_token
        - input_token_mint
        - output_token
        - output_token_mint
        - total_deposit_x
        - total_deposit_y
        - total_deposit_usd
        - total_deposit_sol
        - output_amount_expected
        - total_withdrawal_x
        - total_withdrawal_y
        - total_withdrawal_x_usd
        - total_withdrawal_x_sol
        - total_withdrawal_y_usd
        - total_withdrawal_y_sol
        - total_withdrawal_usd
        - total_withdrawal_sol
        - total_bonus_x
        - total_bonus_y
        - total_bonus_x_usd
        - total_bonus_y_usd
        - total_bonus_x_sol
        - total_bonus_y_sol
        - total_bonus_usd
        - total_bonus_sol
        - realized_pnl_usd
        - realized_pnl_sol
        - realized_pnl_pct_usd
        - realized_pnl_pct_sol
        - filled_pct
        - filled_input_amount
        - received_output_amount
        - opened_at
        - opened_at_signature
        - opened_at_slot
        - last_closed_at
        - terminal_signature
        - terminal_slot
      properties:
        filled_input_amount:
          type: string
          description: Filled amount, in input (deposit) token display units.
        filled_pct:
          type: string
          description: Percentage of the order's deposit that was filled before it closed.
        input_token:
          type: string
          description: Symbol of the deposited token (X for ask, Y for bid).
        input_token_mint:
          type: string
          description: Mint address of the deposited token.
        is_ask_side:
          type: boolean
          description: |-
            `true` for an ask (selling token X for Y), `false` for a bid
            (buying X with Y).
        last_closed_at:
          type: integer
          format: int64
          description: Block time of the close, in Unix seconds.
          minimum: 0
        limit_order_address:
          type: string
          description: On-chain limit order account address.
        lower_pool_price:
          type: number
          format: double
          description: Lower bound of the order's price range, in token Y per token X.
        opened_at:
          type: integer
          format: int64
          description: Block time of the placement, in Unix seconds.
          minimum: 0
        opened_at_signature:
          type: string
          description: Signature of the placement transaction.
        opened_at_slot:
          type: integer
          format: int64
          description: Slot of the placement transaction.
          minimum: 0
        output_amount_expected:
          type: string
          description: |-
            Expected output amount if the order had filled entirely at its
            placement bin prices, in output-token display units.
        output_token:
          type: string
          description: Symbol of the expected fill token (Y for ask, X for bid).
        output_token_mint:
          type: string
          description: Mint address of the expected fill token.
        realized_pnl_pct_sol:
          type: string
          description: |-
            Realized PnL as a percentage of the SOL deposit cost basis (`0` when
            the SOL deposit is `0`).
        realized_pnl_pct_usd:
          type: string
          description: |-
            Realized PnL as a percentage of the USD deposit cost basis (`0` when
            the USD deposit is `0`).
        realized_pnl_sol:
          type: string
          description: Realized PnL for this order, in SOL (historical per-event prices).
        realized_pnl_usd:
          type: string
          description: |-
            Realized PnL for this order, in USD: closed withdrawals + bonus −
            deposits, all at historical (placement / cancel-time) prices.
        received_output_amount:
          type: string
          description: |-
            Realised output amount the user received for the filled portion of
            the order, in output-token display units. For an ask this equals
            `total_withdrawal_y`; for a bid, `total_withdrawal_x`.
        terminal_signature:
          type: string
          description: Signature of the close transaction.
        terminal_slot:
          type: integer
          format: int64
          description: Slot of the close transaction.
          minimum: 0
        total_bonus_sol:
          type: string
          description: Combined SOL value of bonus at cancel-time SOL prices.
        total_bonus_usd:
          type: string
          description: Combined USD value of bonus at cancel-time prices.
        total_bonus_x:
          type: string
          description: Token X bonus realised, in token X display units.
        total_bonus_x_sol:
          type: string
          description: SOL value of token X bonus at cancel-time SOL price.
        total_bonus_x_usd:
          type: string
          description: USD value of token X bonus at cancel-time price.
        total_bonus_y:
          type: string
          description: Token Y bonus realised, in token Y display units.
        total_bonus_y_sol:
          type: string
          description: SOL value of token Y bonus at cancel-time SOL price.
        total_bonus_y_usd:
          type: string
          description: USD value of token Y bonus at cancel-time price.
        total_deposit_sol:
          type: string
          description: SOL value of the deposit at placement time.
        total_deposit_usd:
          type: string
          description: USD value of the deposit at placement time (deposit side only).
        total_deposit_x:
          type: string
          description: >-
            Token X deposited at placement, in token X display units (`0` for a
            bid).
        total_deposit_y:
          type: string
          description: >-
            Token Y deposited at placement, in token Y display units (`0` for an
            ask).
        total_withdrawal_sol:
          type: string
          description: Combined SOL value of withdrawals at cancel-time SOL prices.
        total_withdrawal_usd:
          type: string
          description: Combined USD value of withdrawals.
        total_withdrawal_x:
          type: string
          description: >-
            Token X withdrawn over the order's lifetime, in token X display
            units.
        total_withdrawal_x_sol:
          type: string
          description: SOL value of token X withdrawn at cancel-time SOL price.
        total_withdrawal_x_usd:
          type: string
          description: USD value of token X withdrawn at cancel-time price.
        total_withdrawal_y:
          type: string
          description: >-
            Token Y withdrawn over the order's lifetime, in token Y display
            units.
        total_withdrawal_y_sol:
          type: string
          description: SOL value of token Y withdrawn at cancel-time SOL price.
        total_withdrawal_y_usd:
          type: string
          description: USD value of token Y withdrawn at cancel-time price.
        upper_pool_price:
          type: number
          format: double
          description: Upper bound of the order's price range, in token Y per token X.
        user_address:
          type: string
          description: Wallet that owned the order.
    ClosedLimitOrderPoolSummary:
      type: object
      description: |-
        Per-pool summary of a wallet's closed limit orders inside one pool.
        Mirrors the open-pool summary fields and adds withdrawal totals plus the
        most recent close time.
      required:
        - pool
        - total_orders
        - fully_filled_orders
        - filled_pct
        - min_limit_price
        - max_limit_price
        - total_deposit_x
        - total_deposit_y
        - total_deposit_x_usd
        - total_deposit_x_sol
        - total_deposit_y_usd
        - total_deposit_y_sol
        - total_deposit_usd
        - total_deposit_sol
        - total_withdrawal_x
        - total_withdrawal_y
        - total_withdrawal_x_usd
        - total_withdrawal_x_sol
        - total_withdrawal_y_usd
        - total_withdrawal_y_sol
        - total_withdrawal_usd
        - total_withdrawal_sol
        - total_bonus_x
        - total_bonus_y
        - total_bonus_x_usd
        - total_bonus_y_usd
        - total_bonus_x_sol
        - total_bonus_y_sol
        - total_bonus_usd
        - total_bonus_sol
        - realized_pnl_usd
        - realized_pnl_sol
        - realized_pnl_pct_usd
        - realized_pnl_pct_sol
        - last_closed_at
      properties:
        filled_pct:
          type: string
          description: Overall fill percentage across the pool's closed orders.
        fully_filled_orders:
          type: integer
          format: int64
          description: Number of those orders that were fully filled before closing.
          minimum: 0
        last_closed_at:
          type: integer
          format: int64
          description: Block time of the most recent close in this pool, in Unix seconds.
          minimum: 0
        max_limit_price:
          type: string
          description: |-
            Highest limit price (token Y per token X) across the pool's closed
            orders. `0` when the pool has no closed orders.
        min_limit_price:
          type: string
          description: |-
            Lowest limit price (token Y per token X) across the pool's closed
            orders. `0` when the pool has no closed orders.
        pool:
          $ref: '#/components/schemas/LimitOrderPoolDetails'
          description: Pool metadata (pair, tokens, fee, bin step, fee mode).
        realized_pnl_pct_sol:
          type: string
          description: |-
            Realized PnL as a percentage of the SOL deposit cost basis (`0` when
            the SOL deposit is `0`).
        realized_pnl_pct_usd:
          type: string
          description: |-
            Realized PnL as a percentage of the USD deposit cost basis (`0` when
            the USD deposit is `0`).
        realized_pnl_sol:
          type: string
          description: |-
            Realized PnL across the pool's closed orders, in SOL (historical
            per-event prices).
        realized_pnl_usd:
          type: string
          description: |-
            Realized PnL across the pool's closed orders, in USD: closed
            withdrawals + bonus − deposits, all at historical (placement /
            cancel-time) prices.
        total_bonus_sol:
          type: string
          description: Combined SOL value of bonus at cancel-time SOL prices.
        total_bonus_usd:
          type: string
          description: Combined USD value of bonus at cancel-time prices.
        total_bonus_x:
          type: string
          description: Token X bonus realised, in token X display units.
        total_bonus_x_sol:
          type: string
          description: SOL value of token X bonus at cancel-time SOL price.
        total_bonus_x_usd:
          type: string
          description: USD value of token X bonus at cancel-time price.
        total_bonus_y:
          type: string
          description: Token Y bonus realised, in token Y display units.
        total_bonus_y_sol:
          type: string
          description: SOL value of token Y bonus at cancel-time SOL price.
        total_bonus_y_usd:
          type: string
          description: USD value of token Y bonus at cancel-time price.
        total_deposit_sol:
          type: string
          description: Combined SOL value of deposits at placement time.
        total_deposit_usd:
          type: string
          description: >-
            Combined USD value of deposits (an ask deposits X, a bid deposits
            Y).
        total_deposit_x:
          type: string
          description: Token X deposited across ask orders, in token X display units.
        total_deposit_x_sol:
          type: string
          description: SOL value of token X deposits at placement time.
        total_deposit_x_usd:
          type: string
          description: USD value of token X deposits at placement time.
        total_deposit_y:
          type: string
          description: Token Y deposited across bid orders, in token Y display units.
        total_deposit_y_sol:
          type: string
          description: SOL value of token Y deposits at placement time.
        total_deposit_y_usd:
          type: string
          description: USD value of token Y deposits at placement time.
        total_orders:
          type: integer
          format: int64
          description: Number of closed limit orders in this pool.
          minimum: 0
        total_withdrawal_sol:
          type: string
          description: Combined SOL value of withdrawals at cancel-time SOL prices.
        total_withdrawal_usd:
          type: string
          description: Combined USD value of withdrawals at cancel-time prices.
        total_withdrawal_x:
          type: string
          description: >-
            Token X withdrawn (deposit returned and / or filled output), in
            token

            X display units.
        total_withdrawal_x_sol:
          type: string
          description: SOL value of token X withdrawn at cancel-time SOL price.
        total_withdrawal_x_usd:
          type: string
          description: USD value of token X withdrawn at cancel-time price.
        total_withdrawal_y:
          type: string
          description: >-
            Token Y withdrawn (deposit returned and / or filled output), in
            token

            Y display units.
        total_withdrawal_y_sol:
          type: string
          description: SOL value of token Y withdrawn at cancel-time SOL price.
        total_withdrawal_y_usd:
          type: string
          description: USD value of token Y withdrawn at cancel-time price.
    ClosedLimitOrdersForPoolResponse:
      type: object
      description: >-
        Response for the per-pool closed limit orders endpoint. Pool metadata is

        emitted once at the top; per-order rows in `data` only carry
        order-specific

        fields.
      required:
        - pool
        - total
        - pages
        - current_page
        - page_size
        - data
      properties:
        current_page:
          type: integer
          format: int64
          description: Current page number (1-indexed).
          minimum: 0
        data:
          type: array
          items:
            $ref: '#/components/schemas/ClosedLimitOrderDetail'
          description: One row per closed limit order in this pool for the current page.
        page_size:
          type: integer
          format: int64
          description: Page size used for this response.
          minimum: 0
        pages:
          type: integer
          format: int64
          description: Total number of pages at the requested page size.
          minimum: 0
        pool:
          $ref: '#/components/schemas/LimitOrderPoolDetails'
          description: Pool metadata (pair, tokens, fee, bin step, fee mode).
        total:
          type: integer
          format: int64
          description: Total number of closed limit orders the wallet has in this pool.
          minimum: 0
    ClosedPositionsResponse:
      type: object
      required:
        - position_address
        - pool_address
        - created_at
        - closed_at
        - lower_bin_id
        - upper_bin_id
        - total_deposits
        - total_withdraws
        - total_claimed_fees
        - pnl
        - pnl_change_pct
      properties:
        closed_at:
          type: integer
          format: int64
          minimum: 0
        created_at:
          type: integer
          format: int64
          minimum: 0
        lower_bin_id:
          type: integer
          format: int32
        pnl:
          type: number
          format: double
        pnl_change_pct:
          type: number
          format: double
        pool_address:
          type: string
        position_address:
          type: string
        total_claimed_fees:
          $ref: '#/components/schemas/AmountTotals'
        total_deposits:
          $ref: '#/components/schemas/AmountTotals'
        total_withdraws:
          $ref: '#/components/schemas/AmountTotals'
        upper_bin_id:
          type: integer
          format: int32
    CumulativeMetrics:
      type: object
      required:
        - volume
        - fees
      properties:
        fees:
          type: number
          format: double
        volume:
          type: number
          format: double
    CurrentPosition:
      type: object
      required:
        - current_deposits
        - unclaimed_fees
        - updated_at_slot
      properties:
        current_deposits:
          $ref: '#/components/schemas/AmountTotals'
        unclaimed_fees:
          $ref: '#/components/schemas/AmountTotals'
        updated_at_slot:
          type: integer
          format: int64
          minimum: 0
    DailyMetricPoint:
      type: object
      description: A single day in a metric time-series.
      required:
        - timestamp
        - date_time
      properties:
        clean:
          type:
            - number
            - 'null'
          format: double
          description: >-
            Metric value over the filtered pool set. Present when `view` is
            `clean`

            (default) or `both`.
          example: 152001233.1
        date_time:
          type: string
          description: ISO 8601 datetime at midnight UTC of the day.
          example: '2026-05-01T00:00:00+00:00'
        gross:
          type:
            - number
            - 'null'
          format: double
          description: >-
            Metric value over all pools. Present when `view` is `gross` or
            `both`.
          example: 152340987.55
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in seconds for midnight UTC of the day.
          example: 1746057600
    DailyMetricResponse:
      type: object
      description: Daily metric time-series, ordered by day ascending.
      required:
        - data_points
      properties:
        data_points:
          type: array
          items:
            $ref: '#/components/schemas/DailyMetricPoint'
          description: One entry per UTC day that has swap activity, oldest first.
        refreshed_at:
          type:
            - integer
            - 'null'
          format: int64
          description: >-
            Unix seconds (UTC) of the refresh that produced this series. Omitted

            for protocols that do not serve the series from a materialized
            table.
          example: 1751846400
    DailyMetricView:
      type: string
      description: Which figures to include in each data point.
