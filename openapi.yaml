          type: string
          description: SOL value of the filled portion at the current SOL spot price.
        total_filled_amount_usd:
          type: string
          description: USD value of the filled portion at current spot prices.
        total_unfilled_amount:
          type: string
          description: |-
            Remaining unfilled deposit, in input-token display units
