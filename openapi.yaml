          type:
            - string
            - 'null'
          description: PnL percent change (SOL)
        totalPositions:
          type: integer
          format: int64
          description: Total number of open positions across all pools
          minimum: 0
        unclaimedFees:
          type: string
          description: Current unclaimed fees in USD
        unclaimedFeesSol:
          type:
            - string
            - 'null'
          description: Current unclaimed fees in SOL
    TotalUsd:
      type: object
      description: Combined total in USD and SOL
      required:
        - usd
      properties:
        sol:
          type:
            - string
            - 'null'
          description: Total in SOL; omitted when the SOL price is unavailable
        usd:
          type: string
          description: Total in USD
    UnrealizedPnL:
      type: object
      description: |-
        Current (unrealized) value of an open position: live balances plus
        unclaimed fees and rewards
      required:
        - balances
        - balanceTokenX
        - balanceTokenY
        - unclaimedFeeTokenX
        - unclaimedFeeTokenY
        - unclaimedRewardTokenX
        - unclaimedRewardTokenY
      properties:
        balanceTokenX:
          $ref: '#/components/schemas/TokenAmount'
          description: Current token X balance
        balanceTokenY:
          $ref: '#/components/schemas/TokenAmount'
          description: Current token Y balance
        balances:
          type: number
          format: double
          description: Total current position balances in USD
        balancesSol:
          type:
            - string
            - 'null'
          description: >-
            Total current position balances in SOL; omitted when the SOL price
            is

            unavailable
        unclaimedFeeTokenX:
          $ref: '#/components/schemas/TokenAmount'
          description: Unclaimed fees in token X
        unclaimedFeeTokenY:
          $ref: '#/components/schemas/TokenAmount'
          description: Unclaimed fees in token Y
        unclaimedRewardTokenX:
          $ref: '#/components/schemas/TokenAmount'
          description: Unclaimed rewards in reward token X
        unclaimedRewardTokenY:
          $ref: '#/components/schemas/TokenAmount'
          description: Unclaimed rewards in reward token Y
    VolumeHistoryResponse:
      type: object
      required:
        - timestamp
        - timestamp_str
        - volume
        - fees
        - protocol_fees
      properties:
        fees:
          type: number
          format: double
        protocol_fees:
          type: number
          format: double
        timestamp:
          type: integer
          format: int64
          minimum: 0
        timestamp_str:
          type: string
        volume:
          type: number
          format: double

