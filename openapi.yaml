openapi: 3.1.0
info:
  title: DLMM API
  description: ''
  license:
    name: ''
  version: 0.1.0
paths:
  /pools:
    get:
      tags:
        - Pools
      summary: Pools
      description: Returns a paginated list of pools
      operationId: Get Pools
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 1
        - name: page_size
          in: query
          description: Number of pools to return per page. Max 1000
          required: false
          schema:
            type:
              - integer
              - 'null'
            maximum: 1000
            minimum: 1
        - name: query
          in: query
          description: Search query used to match pools by name, tokens, or address
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: sort_by
          in: query
          description: >-
            Sort results by one or more fields


            Format:

            - Time-windowed metrics: `<metric>_<window>:<direction>`

            - Non-windowed metrics: `<field>:<direction>`


            - `direction`: `asc` or `desc`

            - `window` (when applicable): `5m` `30m` `1h` `2h` `4h` `12h` `24h`


            Available fields:

            - Time-windowed metrics: `volume_*` `fee_*` `fee_tvl_ratio_*`
            `apr_*`

            - Non-windowed metrics: `tvl` `fee_pct` `bin_step` `pool_created_at`
            `farm_apy`


            Default: `volume_24h:desc`


            Examples:

            - `volume_24h:desc`

            - `fee_1h:asc`

            - `tvl:desc`
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: filter_by
          in: query
          description: |-
            Conditions to filter documents by field values

            Format: `<expr> [&& <expr> ...]`

            Where each expression is: `<field><op><value>`

            Allowed fields:
            - Numeric: `tvl` `volume_*` `fee_*` `fee_tvl_ratio_*` `apr_*`
            - Boolean: `is_blacklisted`
            - Text: `pool_address` `name` `token_x` `token_y`

            Operators:
            - Numeric: `=` `>` `>=` `<` `<=`
            - Boolean: `=true` `=false`
            - Text:
              - exact match: `=<value>`
              - multi-value OR: `=[value1|value2|...]`

            Notes:
            - Multiple expressions are combined using logical **AND** (`&&`)
            - Whitespace around operators is ignored

            Examples:
            - `tvl>1000`
            - `is_blacklisted=false && volume_24h>=50000`
          required: false
          schema:
            type:
              - string
              - 'null'
          example: is_blacklisted=false
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - pages
                  - current_page
                  - page_size
                  - data
                properties:
                  current_page:
                    type: integer
                    format: int64
                    minimum: 0
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - address
                        - name
                        - token_x
                        - token_y
                        - reserve_x
                        - reserve_y
                        - token_x_amount
                        - token_y_amount
                        - created_at
                        - reward_mint_x
                        - reward_mint_y
                        - pool_config
                        - dynamic_fee_pct
                        - tvl
                        - current_price
                        - apr
                        - apy
                        - has_farm
                        - farm_apr
                        - farm_apy
                        - volume
                        - fees
                        - protocol_fees
                        - fee_tvl_ratio
                        - cumulative_metrics
                        - is_blacklisted
                        - tags
                      properties:
                        address:
                          type: string
                          description: Address of the liquidity pair
                        apr:
                          type: number
                          format: double
                          description: 24 hour APR
                        apy:
                          type: number
                          format: double
                          description: 24 hour APY
                        created_at:
                          type: integer
                          format: int64
                          description: Pool created at timestamp
                          minimum: 0
                        cumulative_metrics:
                          $ref: '#/components/schemas/CumulativeMetrics'
                          description: Cumulative metrics
                        current_price:
                          type: number
                          format: double
                          description: Price of the liquidity pair
                        dynamic_fee_pct:
                          type: number
                          format: double
                          description: >-
                            Dynamic fee rate. Which is equal to base fee +
                            variable fee.
                        farm_apr:
                          type: number
                          format: double
                          description: Farm reward apr
                        farm_apy:
                          type: number
                          format: double
                          description: Farm reward apy
                        fee_tvl_ratio:
                          $ref: '#/components/schemas/TimeWindowData'
                          description: Fee TVL ratio in percentage in different timeframes
                        fees:
                          $ref: '#/components/schemas/TimeWindowData'
                          description: Fee data in different timeframes
                        has_farm:
                          type: boolean
                          description: Whether the pool has a farm or not
                        is_blacklisted:
                          type: boolean
                          description: Flag to indicate whether the pair is blacklisted
                        launchpad:
                          type:
                            - string
                            - 'null'
                          description: Launchpad of the pair
                        name:
                          type: string
                          description: Name of the liquidity pair
                        pool_config:
                          $ref: '#/components/schemas/PoolConfig'
                          description: Pool config
                        protocol_fees:
                          $ref: '#/components/schemas/TimeWindowData'
                          description: Protocol fee data in different timeframes
                        reserve_x:
                          type: string
                          description: Address of token X reserve of the liquidity pair
                        reserve_y:
                          type: string
                          description: Address of token Y reserve of the liquidity pair
                        reward_mint_x:
                          type: string
                          description: >-
                            Address of the farming reward X of the liquidity
                            pair
                        reward_mint_y:
                          type: string
                          description: >-
                            Address of the farming reward Y of the liquidity
                            pair
                        tags:
                          type: array
                          items:
                            type: string
                          description: Tags of the pair
                        token_x:
                          $ref: '#/components/schemas/TokenMetrics'
                          description: Token X of the liquidity pair
                        token_x_amount:
                          type: number
                          format: double
                          description: Token X amount the liquidity pair hold
                        token_y:
                          $ref: '#/components/schemas/TokenMetrics'
                          description: Token Y of the liquidity pair
                        token_y_amount:
                          type: number
                          format: double
                          description: Token Y amount the liquidity pair hold
                        tvl:
                          type: number
                          format: double
                          description: >-
                            Total liquidity the liquidity pair holding. Also
                            known as Total Value Locked
                        volume:
                          $ref: '#/components/schemas/TimeWindowData'
                          description: Volume data in different timeframes
                  page_size:
                    type: integer
                    format: int64
                    minimum: 0
                  pages:
                    type: integer
                    format: int64
                    minimum: 0
                  total:
                    type: integer
                    format: int64
                    minimum: 0
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pools/{address}:
    get:
      tags:
        - Pools
      summary: Pool
      description: Returns metadata and current state for a single pool
      operationId: Get Pool
      parameters:
        - name: address
          in: path
          description: Base58-encoded pool address
          required: true
          schema:
            type: string
          example: 5hbf9JP8k5zdrZp9pokPypFQoBse5mGCmW6nqodurGcd
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pools/{address}/ohlcv:
    get:
      tags:
        - Pools
      summary: OHLCV
      description: >-
        Returns OHLCV candles for a single pool over a time range


        **Notes**

        - If both `start_time` and `end_time` are provided, candles are returned
        in the range `[start_time, end_time]`

        - If only one of `start_time` or `end_time` is provided, the missing
        bound is inferred using the selected `timeframe`

        - If neither is provided, a default range is used based on `timeframe`
      operationId: Get OHLCV
      parameters:
        - name: address
          in: path
          description: Base58-encoded pool address
          required: true
          schema:
            type: string
          example: 5hbf9JP8k5zdrZp9pokPypFQoBse5mGCmW6nqodurGcd
        - name: timeframe
          in: query
          description: |-
            Candle interval

            Allowed values `5m` `30m` `1h` `2h` `4h` `12h` `24h`

            If omitted, the API uses `24h`
          required: false
          schema:
            type: string
            default: 24h
        - name: start_time
          in: query
          description: |-
            Unix timestamp in seconds (inclusive)

            If omitted, the API uses a default range based on `timeframe`
          required: false
          schema:
            type: integer
            minimum: 0
        - name: end_time
          in: query
          description: |-
            Unix timestamp in seconds (inclusive)

            If omitted, the API uses "now" as the end
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeseriesResponse_OHLCVResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pools/{address}/volume/history:
    get:
      tags:
        - Pools
      summary: Historical Volume
      description: >-
        Returns historical volume for a pool aggregated into time buckets


        **Notes**

        - If both `start_time` and `end_time` are provided, the result covers
        the range `[start_time, end_time]`

        - If only one of `start_time` or `end_time` is provided, the missing
        bound is inferred using the selected `timeframe`

        - If neither is provided, a default range is used based on `timeframe`
      operationId: Get Historical Volume
      parameters:
        - name: address
          in: path
          description: Base58-encoded pool address
          required: true
          schema:
            type: string
          example: 5hbf9JP8k5zdrZp9pokPypFQoBse5mGCmW6nqodurGcd
        - name: timeframe
          in: query
          description: |-
            Timeframe

            Allowed values `5m` `30m` `1h` `2h` `4h` `12h` `24h`

            If omitted, the API uses `24h`
          required: false
          schema:
            oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/TimeFrame'
            default: 24h
        - name: start_time
          in: query
          description: |-
            Unix timestamp in seconds (inclusive)

            If omitted, the API uses a default range based on `timeframe`
          required: false
          schema:
            type: integer
            minimum: 0
        - name: end_time
          in: query
          description: |-
            Unix timestamp in seconds (inclusive)

            If omitted, the API uses "now" as the end
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeseriesResponse_VolumeHistoryResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /portfolio:
    get:
      tags:
        - Portfolio
      summary: Get user portfolio with all pools containing closed positions
      description: >-
        Returns a paginated list of pools where the user has closed positions,

        sorted by most recent activity (last_closed_at DESC). The response
        includes:

        - Pool metadata (address, token symbols, icons, fees)

        - Aggregated PnL data (deposits, withdrawals, fees, total PnL)

        - Per-token breakdowns (X and Y)


        For detailed position history within each pool, call the
        /positions/{pool_address}/pnl endpoint.




        # Arguments


        * `user` - The wallet address of the user

        * `page` - Page number for pagination (default: 1)

        * `page_size` - Number of pools per page (default: 120, max: 365)

        * `days_back` - Only include pools with positions closed within this
        many days (default: 365)


        # Returns


        * `200` - The user's portfolio with pool metadata and aggregated PnL

        * `400` - Invalid user address or query parameters
      operationId: get_user_portfolio
      parameters:
        - name: user
          in: query
          description: User's wallet address
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: 'Page number for pagination (minimum: 1, default: 1)'
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: page_size
          in: query
          description: 'Page size for pagination (default: 20, maximum: 50)'
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: days_back
          in: query
          description: |-
            Only include pools with positions closed within this many days
            Applied only for closed positions
            (minimum: 1, maximum: 365, default: 365)
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPortfolioResponse'
  /portfolio/open:
    get:
      tags:
        - Portfolio
      summary: Get user open portfolio
      description: >-
        Paginated list of pools where the wallet has open positions. Each pool

        entry carries current balances and unclaimed fees (USD and SOL), live
        PnL,

        total deposits, fees earned per unit of deposited value over the
        trailing

        24h, the open position addresses, and out-of-range status. The response

        also includes totals aggregated across all pools and the SOL price used

        for conversions (omitted when unavailable). Sortable by current
        balances,

        unclaimed fees, or 24h fee-per-TVL.
      operationId: get_user_open_portfolio
      parameters:
        - name: user
          in: query
          description: User's wallet address
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: 'Page number for pagination (minimum: 1, default: 1)'
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: page_size
          in: query
          description: 'Page size for pagination (default: 20, maximum: 50)'
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: sort_direction
          in: query
          description: Sort direction, default is DESC
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
        - name: sort_by
          in: query
          description: Sort by field, default is current_balances
          required: false
          schema:
            $ref: '#/components/schemas/GetOpenPortfolioSort'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOpenPortfolioResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /portfolio/total:
    get:
      tags:
        - Portfolio
      summary: Get total portfolio PnL across all pools
      description: >-
        Returns the all-time total PnL in USD and percentage change across all
        user's pools.

        This aggregates data from all closed positions across the entire
        portfolio.


        # Arguments


        * `user` - The wallet address of the user


        # Returns


        * `200` - The user's total portfolio PnL

        * `400` - Invalid user address or query parameters
      operationId: get_portfolio_total
      parameters:
        - name: user
          in: query
          description: User's wallet address
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved portfolio totals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioTotalResponse'
        '400':
          description: Invalid user address or unsupported product type
  /positions/{address}/historical:
    get:
      tags:
        - Positions
      summary: Get the historical events for a position
      description: |-
        This endpoint returns the historical actions for a position.

        # Arguments

        * `address` - The address of the position

        # Returns

        * `200` - The historical actions for the position
      operationId: get_position_historical_events
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: event_type
          in: query
          description: |-
            Filter by event type (add, remove, claim_fee, claim_reward).
            If not provided, returns all event types.
          required: false
          schema:
            oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/PositionEventType'
        - name: order_direction
          in: query
          description: |-
            Order direction for sorting events by block time.
            - `asc`: Oldest events first
            - `desc`: Most recent events first (default)
          required: false
          schema:
            oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/PositionEventOrderDirection'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPositionHistoricalEventsResponse'
  /positions/{pool_address}/pnl:
    get:
      tags:
        - Positions
      summary: Get position PnL for a pool
      description: >-
        Paginated list of a wallet's positions in a pool with PnL in USD and
        SOL:

        all-time deposits, withdrawals, and claimed fees, plus live balances and

        unclaimed fees for open positions. SOL-denominated values are omitted
        when

        the SOL price is unavailable. Filterable by position status (`open`,

        `closed`, or `all`).
      operationId: get_pool_position_pnl
      parameters:
        - name: pool_address
          in: path
          description: Pool address
          required: true
          schema:
            type: string
        - name: user
          in: query
          description: The user's wallet address
          required: true
          schema:
            type: string
        - name: status
          in: query
          description: >-
            Filter positions by status: "open", "closed", or "all" (default:
            "all")
          required: false
          schema:
            $ref: '#/components/schemas/PositionStatus'
        - name: page
          in: query
          description: 'Page number for pagination (minimum: 1, default: 1)'
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: page_size
          in: query
          description: 'Page size for pagination (minimum: 1, maximum: 100, default: 20)'
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPoolPositionPnLResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /stats/daily/protocol_fees:
    get:
      tags:
        - Stats
      summary: Get Daily Protocol Fees
      description: >-
        Protocol fees (the protocol's own share of swap fees, USD) per UTC day,

        oldest first. Defaults to the full available history; pass `start_time`
        /

        `end_time` (Unix seconds) to narrow the window. Each day reports the
        value

        over the filtered pool set by default; set `view` to `gross` (all pools)
        or

        `both`.
      operationId: Get Daily Protocol Fees
      parameters:
        - name: start_time
          in: query
          description: >-
            Unix timestamp in seconds (inclusive). If omitted, the series starts
            at

            the protocol's earliest available day.
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 0
          example: 1712188800
        - name: end_time
          in: query
          description: >-
            Unix timestamp in seconds (inclusive). If omitted, the series ends
            today.
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 0
          example: 1750032000
        - name: view
          in: query
          description: >-
            Which figures to include per day: `clean` (the filtered pool set,
            the

            default), `gross` (all pools), or `both`.
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/DailyMetricView'
            default: clean
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyMetricResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /stats/daily/trading_fees:
    get:
      tags:
        - Stats
      summary: Get Daily Trading Fees
      description: >-
        Total trading fees paid by swappers (USD) per UTC day, oldest first.
        Defaults

        to the full available history; pass `start_time` / `end_time` (Unix
        seconds)

        to narrow the window. Each day reports the value over the filtered pool
        set

        by default; set `view` to `gross` (all pools) or `both`.
      operationId: Get Daily Trading Fees
      parameters:
        - name: start_time
          in: query
          description: >-
            Unix timestamp in seconds (inclusive). If omitted, the series starts
            at

            the protocol's earliest available day.
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 0
          example: 1712188800
        - name: end_time
          in: query
          description: >-
            Unix timestamp in seconds (inclusive). If omitted, the series ends
            today.
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 0
          example: 1750032000
        - name: view
          in: query
          description: >-
            Which figures to include per day: `clean` (the filtered pool set,
            the

            default), `gross` (all pools), or `both`.
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/DailyMetricView'
            default: clean
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyMetricResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /stats/daily/volume:
    get:
      tags:
        - Stats
      summary: Get Daily Trading Volume
      description: >-
        Trading volume (USD value swapped in) per UTC day, oldest first.
        Defaults to

        the full available history; pass `start_time` / `end_time` (Unix
        seconds) to

        narrow the window. Each day reports the value over the filtered pool set
        by

        default; set `view` to `gross` (all pools) or `both`.
      operationId: Get Daily Trading Volume
      parameters:
        - name: start_time
          in: query
          description: >-
            Unix timestamp in seconds (inclusive). If omitted, the series starts
            at

            the protocol's earliest available day.
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 0
          example: 1712188800
        - name: end_time
          in: query
          description: >-
            Unix timestamp in seconds (inclusive). If omitted, the series ends
            today.
          required: false
          schema:
            type:
              - integer
              - 'null'
            minimum: 0
          example: 1750032000
        - name: view
          in: query
          description: >-
            Which figures to include per day: `clean` (the filtered pool set,
            the

            default), `gross` (all pools), or `both`.
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/DailyMetricView'
            default: clean
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyMetricResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /stats/protocol_metrics:
    get:
      tags:
        - Stats
      summary: Protocol Overview
      description: Returns aggregated protocol-level metrics across all pools
      operationId: Get Protocol Overview
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolMetricsResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /wallets/{wallet}/limit_orders/closed/pools:
    get:
      tags:
        - Limit Orders
      summary: Get Closed Limit Order Pools
      description: |-
        Paginated per-pool summary of a wallet's closed limit orders, sorted by
        most recent close time first. Cancel-only orders are not yet closed and
        remain in the open endpoints.
      operationId: Get Closed Limit Order Pools
      parameters:
        - name: wallet
          in: path
          description: Base58-encoded wallet address
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Page number, 1-indexed.
