        tokenX:
          type:
            - string
            - 'null'
          description: Token X mint address; `null` when the pool has no positions
        tokenXPrice:
          type: string
          description: Current token X price in USD; `"0"` when unavailable
        tokenY:
          type:
            - string
            - 'null'
          description: Token Y mint address; `null` when the pool has no positions
        tokenYPrice:
